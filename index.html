</head>
<body>
<div id="app">
  <main id="main-content"></main>
</div>

<script>
// ── STATE ──────────────────────────────────────────────
const state = {
  avatarType: localStorage.getItem('avatarType') || null,
  stars:      parseInt(localStorage.getItem('stars'))  || 0,
  xp:         parseInt(localStorage.getItem('xp'))     || 0,
  level:      parseInt(localStorage.getItem('level'))  || 1,
  streak:     parseInt(localStorage.getItem('streak')) || 0,
  lastDay:    localStorage.getItem('lastDay') || '',
  completedLessons: JSON.parse(localStorage.getItem('completedLessons') || '[]'),
  lessonScores:     JSON.parse(localStorage.getItem('lessonScores')     || '{}'),
};

function saveState() {
  localStorage.setItem('avatarType',        state.avatarType || '');
  localStorage.setItem('stars',             state.stars);
  localStorage.setItem('xp',               state.xp);
  localStorage.setItem('level',            state.level);
  localStorage.setItem('streak',           state.streak);
  localStorage.setItem('lastDay',          state.lastDay);
  localStorage.setItem('completedLessons', JSON.stringify(state.completedLessons));
  localStorage.setItem('lessonScores',     JSON.stringify(state.lessonScores));
}

function addStars(n) {
  state.stars += n;
  state.xp    += n * 10;
  if (state.xp >= 500) { state.level++; state.xp -= 500; }
  saveState();
}

function updateStreak() {
  const today = new Date().toDateString();
  if (state.lastDay === today) return; // already counted today
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  state.streak = (state.lastDay === yesterday) ? state.streak + 1 : 1;
  state.lastDay = today;
  saveState();
}
// Check streak on load
updateStreak();


// ── AVATARS ────────────────────────────────────────────
const AVATARS = [
  { id:'rocket',  emoji:'🚀', name:'Rocket',  desc:'Fast & adventurous' },
  { id:'dragon',  emoji:'🐲', name:'Drachen',  desc:'Brave & clever' },
  { id:'unicorn', emoji:'🦄', name:'Einhorn', desc:'Creative & fun' },
  { id:'robot',   emoji:'🤖', name:'Robo',    desc:'Logical & precise' },
  { id:'fox',     emoji:'🦊', name:'Fuchs',   desc:'Smart & quick' },
  { id:'owl',     emoji:'🦉', name:'Eule',    desc:'Wise & studious' },
];

function getEmoji() {
  const a = AVATARS.find(x => x.id === state.avatarType);
  return a ? a.emoji : '😊';
}

// ── SCORE HELPERS ──────────────────────────────────────
function scoreStars(pct) {
  if (pct >= 90) return '⭐⭐⭐';
  if (pct >= 60) return '⭐⭐';
  if (pct >  0)  return '⭐';
  return '';
}
function scoreColor(pct) {
  if (pct >= 90) return '#10B981';
  if (pct >= 60) return '#FBBF24';
  return '#F87171';
}
function getAllLessons() {
  const data = window.LESSON_DATA || { levels: [] };
  return data.levels.flatMap(l => l.lessons);
}

// ── ROUTER ─────────────────────────────────────────────
function navigate(route) {
  const main = document.getElementById('main-content');
  // remove any leftover overlays
  document.querySelectorAll('.complete-overlay,.confetti-wrap').forEach(e => e.remove());

  switch(route) {
    case 'splash':          main.innerHTML = splashHTML();       splashHandlers();       break;
    case 'selection_or_home':
      if (!state.avatarType) navigate('selection');
      else navigate('home');
      break;
    case 'selection':       main.innerHTML = selectionHTML();    selectionHandlers();    break;
    case 'home':            main.innerHTML = homeHTML();         homeHandlers();         break;
    case 'map':             main.innerHTML = mapHTML();          mapHandlers();          break;
    case 'lesson-list':     main.innerHTML = lessonListHTML();   lessonListHandlers();   break;
    case 'lesson':          startLesson();                                                break;
    // ── THÊM SCREEN MỚI TẠI ĐÂY ──
    case 'games':           main.innerHTML = gamesHTML();        break;
    case 'game-drag':       main.innerHTML = gameDragHTML();     break;
    case 'game-quiz':       main.innerHTML = gameQuizHTML();     break;
    case 'game-memory':     main.innerHTML = gameMemoryHTML();   break;
    case 'stories':         main.innerHTML = storiesHTML();      storiesHandlers();      break;
    case 'discover':        main.innerHTML = discoverHTML();     discoverHandlers();     break;
    case 'activities':      main.innerHTML = activitiesHTML();   activitiesHandlers();   break;
    default:                navigate('home');
  }
}

// ── SPLASH ─────────────────────────────────────────────
function splashHTML() {
  return `

    <div class="splash-bg-blob b1"></div>
    <div class="splash-bg-blob b2"></div>
    <div class="splash-bg-blob b3"></div>
    <div class="splash-stars">
      <span class="splash-star" style="top:12%;left:8%;animation-delay:0s">⭐</span>
      <span class="splash-star" style="top:22%;right:10%;animation-delay:.6s">✨</span>
      <span class="splash-star" style="top:38%;left:6%;animation-delay:1.1s">💫</span>
      <span class="splash-star" style="top:42%;right:6%;animation-delay:.3s">⭐</span>
      <span class="splash-star" style="top:56%;left:16%;animation-delay:.9s">✨</span>
    </div>
    <img class="splash-mascot" src="img/mascot.png" alt="Luna" onerror="this.style.fontSize='8rem';this.outerHTML='<div class=splash-mascot style=text-align:center;padding-top:60px;font-size:9rem>🧒</div>'">

function splashHandlers() {
  document.getElementById('btn-start')?.addEventListener('click', () => navigate('selection_or_home'));
  document.getElementById('btn-skip')?.addEventListener('click',  () => navigate('selection_or_home'));
}

// ── AVATAR SELECTION ───────────────────────────────────
function selectionHTML() {
  return `
  <div class="screen-padding selection-screen">
    <h1 class="selection-title">Choose Your Buddy</h1>
    <p class="selection-subtitle">Who will join you on your German adventure?</p>
    <div class="avatar-grid">
      ${AVATARS.map(a => `
        <div class="avatar-card" data-id="${a.id}">
          <div class="avatar-card-emoji">${a.emoji}</div>
          <div class="avatar-card-name">${a.name}</div>
          <div class="avatar-card-personality">${a.desc}</div>
        </div>`).join('')}
    </div>
    <div style="width:100%;max-width:300px;margin-top:40px;">
      <button class="btn primary disabled" id="btn-confirm-avatar" style="border-radius:50px;">Let's go! 🚀</button>
    </div>
  </div>`;
}
function selectionHandlers() {
  let sel = null;
  const cards  = document.querySelectorAll('.avatar-card');
  const confirm = document.getElementById('btn-confirm-avatar');
  cards.forEach(c => c.addEventListener('click', () => {
    cards.forEach(x => x.classList.remove('selected'));
    c.classList.add('selected');
    sel = c.dataset.id;
    confirm.classList.remove('disabled');
  }));
  confirm.addEventListener('click', () => {
    if (sel) { state.avatarType = sel; saveState(); navigate('home'); }
  });
}

  const cats  = [
    {icon:'📚', label:'Lessons',    route:'lesson-list'},
    {icon:'🎮', label:'Games',      route:'games'},
    {icon:'📖', label:'Stories',    route:'stories'},
    {icon:'🎨', label:'Activities', route:'activities'},
    {icon:'🔭', label:'Discover',   route:'discover'},

  const feats = [
    {icon:'📚', title:'Lessons',    desc:'Vocabulary & grammar from A1 to B2.',       route:'lesson-list', border:'#818CF8', bg:'#EDE9FE'},
    {icon:'📖', title:'Stories',    desc:'Short German stories for beginners.',        route:'stories',     border:'#34D399', bg:'#D1FAE5'},
    {icon:'🔭', title:'Discover',   desc:'Culture, geography & fun facts about Germany.',route:'discover',  border:'#F472B6', bg:'#FCE7F3'},
    {icon:'🎮', title:'Games',      desc:'Adventure on the map and earn stars!',      route:'games',       border:'#FBBF24', bg:'#FEF3C7'},
    {icon:'🎨', title:'Activities', desc:'Matching games and fun challenges.',         route:'activities',  border:'#60A5FA', bg:'#EFF6FF'},
  ];
  return `
  <div class="home-screen">
    <div class="home-header">
      <div class="home-avatar-wrap">${getEmoji()}</div>
      <div class="home-greeting">
        <div class="home-greeting-name">Hallo, ${name}!</div>
        <div class="home-greeting-sub">📈 Progress ${xpPct}%</div>
      </div>
      <div class="home-notif">🔔<span class="home-notif-dot"></span></div>
    </div>
    <div class="home-body">
      <div class="xp-card">

          <div>

          </div>
          <div style="display:flex;gap:12px;">

          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center;">
            <div><div style="font-size:1.4rem;font-weight:900;color:var(--purple);">${done.length}</div><div style="font-size:.7rem;color:var(--dim);font-weight:700;">Lessons done</div></div>
            <div><div style="font-size:1.4rem;font-weight:900;color:#10B981;">${avg}%</div><div style="font-size:.7rem;color:var(--dim);font-weight:700;">Avg score</div></div>

          </div>
          ${weak.length ? `<div style="margin-top:10px;padding-top:10px;border-top:1px solid #F0EDFF;font-size:.8rem;font-weight:800;color:#F87171;">⚠️ Needs review: ${weak.slice(0,2).map(l=>l.title).join(', ')}${weak.length>2?' +more':''}</div>` : '<div style="margin-top:8px;font-size:.8rem;font-weight:800;color:#10B981;">✅ All lessons looking great!</div>'}

    </div>

function homeHandlers() {
  document.querySelectorAll('[data-route]').forEach(el => {

// ── MAP ────────────────────────────────────────────────
const MAP_LEVELS = [
  {id:1,top:'78%',left:'18%'},{id:2,top:'68%',left:'52%'},
  {id:3,top:'58%',left:'14%'},{id:4,top:'47%',left:'48%'},
  {id:5,top:'38%',left:'55%'},{id:6,top:'28%',left:'16%'},
  {id:7,top:'19%',left:'44%'},{id:8,top:'11%',left:'52%'},
  {id:9,top:'4%', left:'28%'},
];
function mapHTML() {
  const done = state.completedLessons;
  const nodes = MAP_LEVELS.map(l => {
    const isDone   = done.includes('l'+l.id);
    const isActive = !isDone && (l.id===1 || done.includes('l'+(l.id-1)));
    const cls      = isDone?'done':isActive?'active':'locked';
    const glow     = isDone ? 'box-shadow:0 0 18px 6px rgba(251,191,36,.55);' : isActive ? 'box-shadow:0 0 14px 4px rgba(52,211,153,.5);animation:pulseNode 1.4s ease-in-out infinite;' : 'opacity:.45;filter:grayscale(.8);';
    return `<div class="map-node ${cls}" style="top:${l.top};left:${l.left};${glow}" data-id="l${l.id}">
      ${isActive?'<span class="map-node-flag">🚩</span>':''}
      ${isDone?'⭐':isActive?l.id:'🔒'}
    </div>`;
  }).join('');
  return `
  <div class="map-screen">
    <div class="map-bg"></div>
    <div class="map-bg-overlay"></div>
    <div class="map-topbar">
      <div class="map-stat coins">⭐ <span>${state.stars}</span></div>
      <div class="map-stat stars">🔥 <span>${state.streak}d</span></div>
    </div>
    <div class="map-nodes" style="position:relative;min-height:calc(100vh - 160px);">${nodes}</div>
    <div class="map-bottombar">
      <button class="map-btn" id="map-home">🏠</button>
      <button class="map-btn" id="map-lessons">📚</button>
      <button class="map-btn" onclick="navigate('games')">🎮</button>
      <button class="map-btn" onclick="navigate('home')">⚙️</button>
    </div>
  </div>`;
}
function mapHandlers() {
  document.querySelectorAll('.map-node:not(.locked)').forEach(n =>
    n.addEventListener('click', () => navigate('lesson-list')));
  document.getElementById('map-home')?.addEventListener('click',    () => navigate('home'));
  document.getElementById('map-lessons')?.addEventListener('click', () => navigate('lesson-list'));
}

// ── LESSON LIST ────────────────────────────────────────
let activeLevel = 'A1';

// Returns true if a lesson should be unlocked
function isLessonOpen(lessons, idx) {
  const l = lessons[idx];
  if (!l) return false;
  if (state.completedLessons.includes(l.id)) return true; // already done
  if (idx === 0) return true;                              // first lesson always open
  return state.completedLessons.includes(lessons[idx - 1].id); // prev done → unlock
}

// Returns true if a level tab should be accessible
function isLevelOpen(levelIdx, allLevels) {
  if (levelIdx === 0) return true; // A1 always open
  const prevLevel = allLevels[levelIdx - 1];
  if (!prevLevel || !prevLevel.lessons.length) return false;
  // unlock when at least 1 lesson of previous level is completed
  return prevLevel.lessons.some(l => state.completedLessons.includes(l.id));
}

function lessonListHTML() {
  const data   = window.LESSON_DATA || { levels: [] };
  const lvlIdx = data.levels.findIndex(l => l.id === activeLevel);
  const level  = data.levels[lvlIdx] || data.levels[0];
  const lessons = level ? level.lessons : [];

  return `
  <div class="lesson-screen">
    <div class="lesson-header">
      <button class="lesson-back" id="btn-back-list">←</button>
      <h1 class="lesson-title">Pick a New<br><em>Learning Lesson</em></h1>
      <div class="search-bar">
        <span>🔍</span>
        <input type="text" placeholder="Search lessons..." />
      </div>
      <div class="filter-tabs">
        ${data.levels.map((l, i) => {
          const open = isLevelOpen(i, data.levels);
          const doneCount = l.lessons.filter(ls => state.completedLessons.includes(ls.id)).length;
          return `<button class="tab-pill${l.id === activeLevel ? ' active' : ''}${!open ? ' tab-locked' : ''}" data-level="${l.id}"
            style="${l.id === activeLevel ? 'background:'+l.color+';color:white;' : ''}"
            title="${!open ? 'Complete previous level to unlock' : l.name}">
            ${open ? l.icon : '🔒'} ${l.id}
            ${doneCount > 0 ? `<span style="font-size:.65rem;margin-left:3px;">${doneCount}/${l.lessons.length}</span>` : ''}
          </button>`;
        }).join('')}
      </div>
    </div>
    <div class="lesson-list">
      ${lessons.map((l, i) => {
        const done   = state.completedLessons.includes(l.id);
        const open   = isLessonOpen(lessons, i);
        const score  = state.lessonScores[l.id];
        const bestPct = score ? score.best : 0;
        const attempts = score ? score.attempts : 0;
        const barColor = bestPct >= 90 ? '#10B981' : bestPct >= 60 ? '#FBBF24' : '#818CF8';
        return `
        <div class="lesson-card${!open ? ' lesson-locked' : ''}" data-id="${l.id}" data-unlocked="${open}">
          <div style="flex:1;">
            <div class="lesson-card-label" style="color:${level.color}">${level.id} · Lesson ${i+1} · ${l.subtitle}</div>
            <div class="lesson-card-title">${l.icon} ${l.title}</div>
            <div class="lesson-card-desc">${l.questions.length} questions
              ${done ? ' · ✅ Completed' : ''}
              ${attempts > 0 ? ` · ${attempts} attempt${attempts>1?'s':''}` : ''}
            </div>
            ${bestPct > 0 ? `
            <div style="margin-top:8px;">
              <div style="display:flex;justify-content:space-between;font-size:.72rem;font-weight:800;color:${barColor};margin-bottom:3px;">
                <span>Best score</span><span>${bestPct}%</span>
              </div>
              <div style="height:6px;background:#F0EDFF;border-radius:3px;overflow:hidden;">
                <div style="height:100%;width:${bestPct}%;background:${barColor};border-radius:3px;transition:width .6s;"></div>
              </div>
            </div>` : ''}
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
            <div class="lesson-card-badge" style="background:${done ? level.color : open ? '#E9E5FF' : '#CBD5E1'};color:${done ? 'white' : open ? level.color : '#94A3B8'}">
              ${done ? '⭐' : open ? `${i+1}` : '🔒'}
            </div>
            <div class="lesson-card-footer">
              ${open
                ? `<button class="btn-lesson-action start" data-id="${l.id}" style="background:${level.color}">▶ ${done?'Review':'Start'}</button>`
                : `<button class="btn-lesson-action locked" disabled>Locked</button>`}
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function lessonListHandlers() {
  document.getElementById('btn-back-list')?.addEventListener('click', () => navigate('home'));
  document.querySelectorAll('.tab-pill[data-level]').forEach(b => b.addEventListener('click', () => {
    activeLevel = b.dataset.level;
    document.getElementById('main-content').innerHTML = lessonListHTML();
    lessonListHandlers();
  }));
  document.querySelectorAll('.btn-lesson-action.start[data-id]').forEach(b => {
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      currentLessonId = b.dataset.id;
      navigate('lesson');
    });
  });
}

// ── LESSON / QUIZ ──────────────────────────────────────
let currentLessonId = null;
let curQ = 0, quizScore = 0;

function getLessonQuestions() {
  if (!window.LESSON_DATA || !currentLessonId) return FALLBACK_Q;
  for (const level of window.LESSON_DATA.levels) {
    const lesson = level.lessons.find(l => l.id === currentLessonId);
    if (lesson) return lesson.questions;
  }
  return FALLBACK_Q;
}

// Preferred German voices (in order of quality)
const PREFERRED_VOICES = [
  'Google Deutsch',
  'Microsoft Hedda',
  'Microsoft Stefan',
  'Anna',           // macOS German
  'Markus',         // macOS German (male)
  'Yannick',        // macOS
];

let _cachedVoice = null;

function getBestGermanVoice() {
  if (_cachedVoice) return _cachedVoice;
  const voices = speechSynthesis.getVoices();
  // Try preferred list first
  for (const name of PREFERRED_VOICES) {
    const v = voices.find(v => v.name.includes(name));
    if (v) { _cachedVoice = v; return v; }
  }
  // Fallback: any de-DE voice
  const deDE = voices.find(v => v.lang === 'de-DE');
  if (deDE) { _cachedVoice = deDE; return deDE; }
  // Last resort: any German voice
  const de = voices.find(v => v.lang.startsWith('de'));
  _cachedVoice = de || null;
  return _cachedVoice;
}

function speak(word) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel(); // stop any ongoing speech
  const u = new SpeechSynthesisUtterance(word);
  u.lang  = 'de-DE';
  u.rate  = 0.85;   // slightly slower — clearer for learning
  u.pitch = 1.0;
  u.volume = 1.0;
  const voice = getBestGermanVoice();
  if (voice) u.voice = voice;
  speechSynthesis.speak(u);
}

// Pre-load voices (Chrome loads async)
if ('speechSynthesis' in window) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => { _cachedVoice = null; };
}


function handleAnswer(btn) {
  const correct = btn.dataset.correct === 'true';
  document.querySelectorAll('.choice-btn').forEach(b => {
    b.onclick = null;
    if (b.dataset.correct==='true') { b.style.background='#D1FAE5'; b.style.borderColor='#10B981'; }
  });
  const av = document.getElementById('quiz-avatar');
  if (correct) {
    quizScore += 100;
    btn.style.background='#D1FAE5'; btn.style.borderColor='#10B981';
    btn.classList.add('answer-correct');
    if (av) av.innerHTML=`<span style="font-size:3.5rem;display:inline-block;animation:bounce .6s infinite alternate;">🥳</span>`;
    setTimeout(nextQ, 900);
  } else {
    btn.style.background='#FEE2E2'; btn.style.borderColor='#EF4444';
    btn.classList.add('answer-wrong');
    if (av) av.innerHTML=`<span style="font-size:3.5rem;display:inline-block;">😢</span>`;
    // Track wrong answers for review
    const q = activeQuestions[curQ];
    if (q && !wrongAnswers.find(w=>w.german===q.german)) wrongAnswers.push(q);
    setTimeout(nextQ, 1600);
  }
}

function nextQ() {
  curQ++;
  if (curQ >= activeQuestions.length) {
    if (currentLessonId && !state.completedLessons.includes(currentLessonId))
      state.completedLessons.push(currentLessonId);
    const pct  = Math.round(quizScore / (activeQuestions.length * 100) * 100);
    const prev = state.lessonScores[currentLessonId] || { best: 0, attempts: 0 };
    const isNewBest = pct > prev.best;
    state.lessonScores[currentLessonId] = { best: Math.max(prev.best, pct), attempts: prev.attempts + 1 };
    addStars(10);
    updateStreak();
    saveState();
    document.getElementById('main-content').innerHTML = '';
    showReward(quizScore, activeQuestions.length * 100, isNewBest, [...wrongAnswers]);
    wrongAnswers = [];
  } else { renderQ(); }
}

function showReward(score, maxScore, isNewBest, wrong) {
  const pct  = Math.round(score / Math.max(maxScore, 1) * 100);
  const stars = pct >= 90 ? 3 : pct >= 60 ? 2 : 1;
  // confetti
  const wrap = document.createElement('div');
  wrap.className = 'confetti-wrap';
  const cols=['#F472B6','#FBBF24','#34D399','#60A5FA','#A78BFA','#F87171'];
  for(let i=0;i<50;i++){
    const p=document.createElement('div');
    p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}%;background:${cols[~~(Math.random()*6)]};
      width:${Math.random()*10+5}px;height:${Math.random()*10+5}px;
      border-radius:${Math.random()>.5?'50%':'3px'};
      animation-duration:${Math.random()*2+1.5}s;animation-delay:${Math.random()*1}s;`;
    wrap.appendChild(p);
  }
  document.body.appendChild(wrap);
  // overlay
  const wrongHTML = wrong && wrong.length ? `
    <div style="margin:12px 0;padding:12px;background:#FEF2F2;border-radius:16px;text-align:left;">
      <div style="font-size:.75rem;font-weight:900;color:#EF4444;margin-bottom:8px;">⚠️ Review these words:</div>
      ${wrong.map(w=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">

        <span style="font-weight:800;color:#1E1B4B;">${w.german}</span>
        <span style="color:#6B7280;font-size:.85rem;">= ${w.english}</span>
        <button onclick="speak('${w.german.replace(/'/g,"\\'")}'); event.stopPropagation();" 
          style="margin-left:auto;background:#F3F0FF;border:none;border-radius:50%;width:28px;height:28px;font-size:.85rem;cursor:pointer;">🔊</button>
      </div>`).join('')}
    </div>` : '';
  const ov = document.createElement('div');
  ov.className = 'reward-overlay';
  ov.innerHTML = `
    <div class="reward-card" id="reward-card">
      <div class="reward-emoji">${pct===100?'🏆':pct>=90?'🎉':pct>=60?'😊':'💪'}</div>
      <div class="reward-title">${pct===100?'Perfect!':pct>=90?'Excellent!':pct>=60?'Great job!':'Keep going!'}</div>
      <div class="reward-stars">${'⭐'.repeat(stars)}${'☆'.repeat(3-stars)}</div>
      ${isNewBest ? '<div style="background:linear-gradient(135deg,#34D399,#059669);color:white;font-weight:900;font-size:.85rem;padding:4px 16px;border-radius:20px;display:inline-block;margin-bottom:8px;animation:starPop .4s ease both;">🏅 New Best!</div>' : ''}
      <div class="reward-badge">+10 ⭐ · ${pct}% score</div>
      <div class="reward-streak">🔥 ${state.streak}-day streak!</div>
      ${wrongHTML}
      <div style="display:flex;gap:10px;margin-top:4px;">
        ${wrong && wrong.length ? `<button class="reward-btn" style="flex:1;background:#F0EDFF;color:var(--purple);box-shadow:none;" 
          onclick="cleanupReward();activeQuestions=[...wrongAnswers_saved];curQ=0;quizScore=0;wrongAnswers=[];renderQ();">Retry wrong</button>` : ''}
        <button class="reward-btn" style="flex:2;" onclick="cleanupReward();navigate('lesson-list');">Continue →</button>
      </div>
    </div>`;
  // Save wrong answers for retry
  window.wrongAnswers_saved = wrong || [];
  document.body.appendChild(ov);
  setTimeout(() => { const c = document.getElementById('reward-card'); if(c) c.classList.add('reward-in'); }, 50);
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('[SW] Registered:', reg.scope))
      .catch(err => console.warn('[SW] Registration failed:', err));
  });
}

// ── PWA INSTALL PROMPT ────────────────────────────────
let _deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredPrompt = e;
  // Show install banner after 3s if not already installed
  setTimeout(() => {
    if (_deferredPrompt && !localStorage.getItem('pwa-dismissed')) {
      showInstallBanner();
    }
  }, 3000);
});

window.addEventListener('appinstalled', () => {
  _deferredPrompt = null;
  const b = document.getElementById('install-banner');
  if (b) b.remove();
  console.log('[PWA] App installed!');
});

function showInstallBanner() {
  if (document.getElementById('install-banner')) return;
  const banner = document.createElement('div');
  banner.id = 'install-banner';
  banner.innerHTML = `
    <div style="position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
      background:white;border-radius:20px;padding:14px 20px;
      box-shadow:0 8px 32px rgba(0,0,0,.18);
      display:flex;align-items:center;gap:12px;z-index:300;
      max-width:360px;width:90%;animation:popIn .3s ease;">
      <img src="img/icon-192.png" style="width:44px;height:44px;border-radius:12px;">
      <div style="flex:1;">
        <div style="font-weight:900;font-size:.9rem;color:#1E1B4B;">Install App 📲</div>
        <div style="font-size:.75rem;color:#6B7280;font-weight:700;">Learn offline, anytime!</div>
      </div>
      <button onclick="installPWA()" 
        style="background:#7C3AED;color:white;border:none;border-radius:12px;
               padding:8px 16px;font-family:var(--font);font-weight:900;
               font-size:.85rem;cursor:pointer;">Install</button>
      <button onclick="dismissInstall()" 
        style="background:none;border:none;font-size:1.2rem;cursor:pointer;color:#9CA3AF;">✕</button>
    </div>`;
  document.body.appendChild(banner);
}

function installPWA() {
  if (!_deferredPrompt) return;
  _deferredPrompt.prompt();
  _deferredPrompt.userChoice.then(result => {
    if (result.outcome === 'accepted') console.log('[PWA] User accepted install');
    _deferredPrompt = null;
    const b = document.getElementById('install-banner');
    if (b) b.remove();
  });
}

function dismissInstall() {
  localStorage.setItem('pwa-dismissed', '1');
  const b = document.getElementById('install-banner');
  if (b) b.style.animation = 'none', b.style.opacity = '0', setTimeout(() => b.remove(), 300);
}
</script>
</body>
</html>
