<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Deutsch für Kinder 🇩🇪</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7C3AED">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Deutsch">
  <link rel="apple-touch-icon" href="img/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="img/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="img/icon-512.png">

  <!-- SEO -->
  <meta name="description" content="Learn German through fun games and lessons — A1 to B2. For kids and beginners.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">

  <!-- Data Scripts (Loaded globally for easy access) -->
  <script src="data/a1.js"></script>
  <script src="data/a2.js"></script>
  <script src="data/b1_b2.js"></script>
  <script src="data/lessons.js"></script>
</head>
<body>
<div id="app">
  <main id="main-content"></main>
</div>

<!-- Main ES6 App Module -->
<script type="module" src="js/app.js"></script>

<script>
// ── PWA & INSTALL BANNER ──────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
    .then(reg => console.log('SW registered:', reg))
    .catch(err => console.error('SW failed:', err));
}

let _deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredPrompt = e;
  if (!localStorage.getItem('pwa-dismissed')) showInstallBanner();
});

function showInstallBanner() {
  const banner = document.createElement('div');
  banner.id = 'install-banner';
  banner.style.cssText = `
    position:fixed; bottom:80px; left:20px; right:20px; 
    background:white; border-radius:16px; padding:16px; 
    box-shadow:0 12px 32px rgba(0,0,0,0.15); z-index:9999;
    display:flex; align-items:center; gap:12px;
    animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  `;
  banner.innerHTML = `
    <img src="img/icon-192.png" style="width:48px;height:48px;border-radius:12px;box-shadow:0 4px 12px rgba(124,58,237,0.2);">
    <div style="flex:1;">
      <div style="font-weight:800;font-size:.95rem;color:var(--text);">Cài đặt App</div>
      <div style="font-size:.75rem;color:var(--dim);font-weight:700;">Học tiếng Đức nhanh hơn!</div>
    </div>
    <button onclick="installPWA()" 
      style="background:linear-gradient(135deg, #8B5CF6, #6D28D9);color:white;border:none;border-radius:12px;
             padding:10px 16px;font-family:var(--font);font-weight:900;
             font-size:.85rem;cursor:pointer;box-shadow:0 4px 12px rgba(124,58,237,0.3);">Cài đặt</button>
    <button onclick="dismissInstall()" 
      style="background:none;border:none;font-size:1.2rem;cursor:pointer;color:#9CA3AF;padding:8px;">✕</button>
  `;
  document.body.appendChild(banner);
}

function installPWA() {
  if (!_deferredPrompt) return;
  _deferredPrompt.prompt();
  _deferredPrompt.userChoice.then(result => {
    if (result.outcome === 'accepted') console.log('[PWA] User accepted install');
    _deferredPrompt = null;
    const b = document.getElementById('install-banner');
    if (b) b.remove();
  });
}

function dismissInstall() {
  localStorage.setItem('pwa-dismissed', '1');
  const b = document.getElementById('install-banner');
  if (b) {
    b.style.transition = 'all 0.3s';
    b.style.opacity = '0';
    b.style.transform = 'translateY(20px)';
    setTimeout(() => b.remove(), 300);
  }
}
</script>
</body>
</html>
